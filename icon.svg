<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded rect -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <rect x="112" y="112" width="800" height="800" rx="192" ry="192" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.4"/>
  
  <!-- Android robot body -->
  <g transform="translate(512, 520)" fill="url(#accent)" filter="url(#glow)">
    <!-- Head -->
    <rect x="-120" y="-180" width="240" height="140" rx="70" ry="70"/>
    <!-- Antennas -->
    <line x1="-80" y1="-180" x2="-110" y2="-240" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
    <line x1="80" y1="-180" x2="110" y2="-240" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-50" cy="-130" r="18" fill="#1a1a2e"/>
    <circle cx="50" cy="-130" r="18" fill="#1a1a2e"/>
    <!-- Body -->
    <rect x="-120" y="-60" width="240" height="200" rx="24" ry="24"/>
    <!-- Arms -->
    <rect x="-200" y="-40" width="60" height="140" rx="30" ry="30"/>
    <rect x="140" y="-40" width="60" height="140" rx="30" ry="30"/>
    <!-- Legs -->
    <rect x="-80" y="120" width="60" height="100" rx="30" ry="30"/>
    <rect x="20" y="120" width="60" height="100" rx="30" ry="30"/>
  </g>
  
  <!-- ADB text -->
  <text x="512" y="780" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="72" font-weight="700" fill="#ffffff" opacity="0.9" letter-spacing="8">ADB</text>
  
  <!-- Terminal cursor blink hint -->
  <rect x="700" y="730" width="20" height="56" fill="#00d4aa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
