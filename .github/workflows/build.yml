name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build stable
        run: bun run build:stable

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adbvis-macos-arm64
          path: |
            build/stable-macos-arm64/
            artifacts/stable-macos-arm64-*
          if-no-files-found: warn

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/stable-macos-arm64-adbvis.app.tar.zst
            artifacts/stable-macos-arm64-adbvis.dmg
            artifacts/stable-macos-arm64-update.json
          generate_release_notes: true
